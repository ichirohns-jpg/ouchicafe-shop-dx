<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>お知らせ一覧｜おうちcafeパン工房</title>
  <meta name="description" content="おうちcafeパン工房のお知らせ一覧です。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="お知らせ一覧｜おうちcafeパン工房">
  <meta property="og:description" content="おうちcafeパン工房のお知らせ一覧です。">
  <meta property="og:image" content="https://ichirohns-jpg.github.io/ouchicafe-shop-dx/main.jpg">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/ouchicafe-shop-dx/news.html">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="icon.jpg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4b2619">

  <style>
    :root{
      --brown:#4b2619;
      --light:#76513d;
      --cream:#fffaf1;
      --paper:#fffdf8;
      --line:#eadfd2;
      --green:#667253;
      --gray:#74695f;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      color:var(--brown);
      background:var(--cream);
      font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      line-height:1.8;
    }

    img{display:block;max-width:100%}
    a{color:inherit}

    .wrap{
      width:min(1040px,calc(100% - 32px));
      margin:auto;
    }

    header{
      background:rgba(255,253,248,.97);
      border-bottom:1px solid var(--line);
    }

    .header-inner{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .brand{
      display:inline-flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      font-weight:900;
    }

    .brand img{
      width:46px;
      height:46px;
      object-fit:cover;
      border-radius:50%;
    }

    .brand span{
      font-size:clamp(15px,3vw,21px);
    }

    .back-link{
      color:var(--light);
      font-size:14px;
      text-decoration:none;
    }

    main{padding:46px 0 72px}

    h1{
      margin:0 0 10px;
      font-size:clamp(30px,6vw,48px);
      line-height:1.3;
    }

    .lead{
      margin:0 0 30px;
      color:var(--light);
    }

    .list{
      display:grid;
      gap:22px;
    }

    .news-card{
      padding:clamp(20px,4vw,32px);
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:0 10px 28px rgba(73,42,24,.08);
    }

    .date{
      margin:0 0 6px;
      color:var(--light);
      font-size:14px;
    }

    h2{
      margin:0 0 14px;
      font-size:clamp(23px,4vw,32px);
      line-height:1.4;
    }

    .body{
      margin:0;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .photo-row{
      display:flex;
      gap:10px;
      overflow-x:auto;
      margin:20px 0;
      padding-bottom:8px;
    }

    .photo-row img{
      flex:0 0 auto;
      width:190px;
      height:190px;
      object-fit:cover;
      border-radius:12px;
    }

    .video-frame{
      width:100%;
      aspect-ratio:16/9;
      margin:20px 0;
      border:0;
      border-radius:14px;
      background:#111;
    }

    .buttons{
      display:flex;
      gap:9px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .button{
      display:inline-flex;
      min-height:46px;
      align-items:center;
      justify-content:center;
      padding:8px 17px;
      color:#fff;
      background:var(--brown);
      border-radius:999px;
      text-decoration:none;
      font-weight:800;
    }

    .button.green{
      background:var(--green);
    }

    .empty,
    .error{
      padding:30px 20px;
      color:var(--gray);
      text-align:center;
      background:var(--paper);
      border:1px dashed #d8c6b5;
      border-radius:16px;
    }

    footer{
      padding:24px 0 42px;
      color:var(--light);
      text-align:center;
      font-size:13px;
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap header-inner">
      <a class="brand" href="index.html">
        <img src="icon.jpg" alt="">
        <span>おうちcafeパン工房</span>
      </a>

      <a class="back-link" href="index.html">
        トップへ戻る
      </a>
    </div>
  </header>

  <main>
    <div class="wrap">
      <h1>お知らせ一覧</h1>

      <p class="lead">
        おうちcafeパン工房からのお知らせです。
      </p>

      <div class="list" id="newsList">
        <div class="empty">
          お知らせを読み込んでいます…
        </div>
      </div>
    </div>
  </main>

  <footer>
    © おうちcafeパン工房
  </footer>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzvfcAQDMuk1E50HWGeR1reZxn0drMnLcra0o0VY-nN9hGWCSV0jhSv9IHrdvAgQUzDMw/exec";

    const SITE_URL =
      "https://ichirohns-jpg.github.io/ouchicafe-shop-dx/";

    const newsList =
      document.getElementById("newsList");

    function escapeHtml(value){
      return String(value ?? "").replace(
        /[&<>'"]/g,
        function(char){
          return {
            "&":"&amp;",
            "<":"&lt;",
            ">":"&gt;",
            "'":"&#39;",
            '"':"&quot;"
          }[char];
        }
      );
    }

    function safeUrl(value){
      const url =
        String(value || "").trim();

      return /^https?:\/\//i.test(url)
        ? url
        : "";
    }

    function youtubeId(value){
      const text =
        String(value || "").trim();

      const match =
        text.match(
          /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{6,})/i
        );

      if(match){
        return match[1];
      }

      return /^[A-Za-z0-9_-]{6,}$/.test(text)
        ? text
        : "";
    }

    function formatDate(value){
      if(!value){
        return "";
      }

      const date =
        new Date(value);

      if(Number.isNaN(date.getTime())){
        return String(value);
      }

      return new Intl.DateTimeFormat(
        "ja-JP",
        {
          year:"numeric",
          month:"long",
          day:"numeric"
        }
      ).format(date);
    }

    async function loadNews(){
      const response =
        await fetch(
          GAS_URL + "?mode=publicNews",
          {
            cache:"no-store"
          }
        );

      if(!response.ok){
        throw new Error(
          "お知らせを取得できませんでした。"
        );
      }

      const result =
        await response.json();

      if(!result.success){
        throw new Error(
          result.message ||
          "お知らせを取得できませんでした。"
        );
      }

      renderNews(
        Array.isArray(result.news)
          ? result.news
          : []
      );
    }

    function renderNews(news){
      if(!news.length){
        newsList.innerHTML =
          '<div class="empty">現在、お知らせはありません。</div>';

        return;
      }

      newsList.innerHTML =
        news.map(function(item){
          const id =
            encodeURIComponent(item.id || "");

          const shareUrl =
            item.shareUrl ||
            SITE_URL +
            "share-news.html?id=" +
            id;

          const images =
            Array.isArray(item.images)
              ? item.images
                  .map(safeUrl)
                  .filter(Boolean)
                  .slice(0,5)
              : [];

          const photos =
            images.length
              ? '<div class="photo-row">' +
                images.map(function(url,index){
                  return (
                    '<img src="' +
                    escapeHtml(url) +
                    '" alt="お知らせ画像 ' +
                    (index + 1) +
                    '" loading="lazy">'
                  );
                }).join("") +
                '</div>'
              : "";

          const video =
            youtubeId(item.videoUrl);

          const videoHtml =
            video
              ? '<iframe class="video-frame" src="https://www.youtube.com/embed/' +
                encodeURIComponent(video) +
                '" title="YouTube動画" allowfullscreen loading="lazy"></iframe>'
              : "";

          const external =
            safeUrl(item.externalUrl);

          return (
            '<article class="news-card">' +
              '<p class="date">' +
                escapeHtml(formatDate(item.date)) +
              '</p>' +

              '<h2>' +
                escapeHtml(item.title || "お知らせ") +
              '</h2>' +

              '<p class="body">' +
                escapeHtml(item.body || "") +
              '</p>' +

              photos +
              videoHtml +

              '<div class="buttons">' +
                '<a class="button" href="' +
                  escapeHtml(shareUrl) +
                '">この記事を見る・共有する</a>' +

                (
                  external
                    ? '<a class="button green" href="' +
                      escapeHtml(external) +
                      '" target="_blank" rel="noopener">詳しく見る ↗</a>'
                    : ""
                ) +

              '</div>' +
            '</article>'
          );
        })
        .join("");
    }

    loadNews().catch(function(error){
      newsList.innerHTML =
        '<div class="error">' +
        escapeHtml(
          error.message ||
          "読み込めませんでした。"
        ) +
        '</div>';
    });
  </script>
</body>
</html>
