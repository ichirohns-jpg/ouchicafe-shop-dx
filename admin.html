<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#4b2619">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>管理者画面｜おうちcafeパン工房</title>
  <link rel="icon" href="icon.jpg">

  <style>
    :root {
      --brown: #4b2619;
      --brown-dark: #32180f;
      --brown-light: #76513d;
      --cream: #fffaf1;
      --paper: #fffdf8;
      --line: #eadfd2;
      --green: #667253;
      --green-dark: #4e5d3d;
      --blue: #286a94;
      --red: #a34b3b;
      --gold: #b97624;
      --gray: #74695f;
      --white: #fff;
      --shadow: 0 10px 28px rgba(73, 42, 24, .10);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--brown-dark);
      background:
        radial-gradient(circle at top, #fffdf8 0, var(--cream) 48%, #f1e3d3 100%);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      font-size: 18px;
      line-height: 1.7;
      -webkit-text-size-adjust: 100%;
    }

    button, input, textarea, select { font: inherit; }
    button, a, label { -webkit-tap-highlight-color: transparent; }
    button { cursor: pointer; }
    img { display: block; max-width: 100%; }
    a { color: inherit; }

    .page {
      width: min(100%, 860px);
      min-height: 100vh;
      margin: 0 auto;
      background: rgba(255, 253, 248, .97);
      box-shadow: 0 0 32px rgba(56, 27, 11, .12);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
      color: #fff;
      background: rgba(75, 38, 25, .98);
      border-bottom: 3px solid #d7a84b;
      backdrop-filter: blur(10px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      text-decoration: none;
      font-weight: 900;
    }

    .brand img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #f4d27a;
    }

    .brand span {
      font-size: clamp(15px, 3vw, 22px);
      line-height: 1.25;
    }

    .back-link {
      padding: 8px 12px;
      color: var(--brown-dark);
      background: #ffe6a6;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    main { padding: 18px 16px 72px; }

    .card {
      margin: 0 0 20px;
      padding: clamp(18px, 4vw, 30px);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .login-card {
      max-width: 600px;
      margin: 28px auto 20px;
    }

    h1, h2, h3, p { margin-top: 0; }

    .page-title {
      margin-bottom: 8px;
      color: var(--brown);
      font-size: clamp(28px, 6vw, 44px);
      line-height: 1.3;
    }

    .lead, .help { color: var(--gray); }
    .lead { margin-bottom: 24px; }
    .help { margin: 7px 0 0; font-size: 13px; }

    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--brown);
      font-weight: 900;
    }

    .required, .optional {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 11px;
      vertical-align: middle;
    }

    .required { color: #fff; background: var(--red); }
    .optional { color: var(--gray); background: #eee4d7; }

    input[type="text"],
    input[type="password"],
    input[type="url"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      min-height: 56px;
      padding: 12px 14px;
      color: var(--brown-dark);
      background: #fffdf9;
      border: 2px solid #d9c9bb;
      border-radius: 12px;
      outline: none;
    }

    textarea {
      min-height: 145px;
      resize: vertical;
      line-height: 1.75;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(102, 114, 83, .13);
    }

    .primary-button,
    .button {
      min-height: 56px;
      padding: 12px 18px;
      color: #fff;
      background: var(--brown);
      border: 0;
      border-radius: 999px;
      font-weight: 900;
    }

    .primary-button { width: 100%; }
    .button.green { background: var(--green); }
    .button.blue { background: var(--blue); }
    .button.red { background: var(--red); }

    .button.light {
      color: var(--brown);
      background: #fff;
      border: 1px solid var(--line);
    }

    .primary-button:disabled,
    .button:disabled {
      cursor: wait;
      opacity: .55;
    }

    .status-message {
      display: none;
      margin: 0 0 18px;
      padding: 13px 15px;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    .status-message.show { display: block; }
    .status-message.info { color: #365b70; background: #e8f2f7; }
    .status-message.success { color: #285b36; background: #e5f4e7; }
    .status-message.error { color: #842f27; background: #fbe8e5; }

    .admin-panel { display: none; }
    .admin-panel.show { display: block; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: clamp(24px, 5vw, 34px);
    }

    .toolbar-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toolbar-buttons .button {
      min-height: 46px;
      padding: 8px 14px;
      font-size: 15px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab-button,
    .filter-button {
      min-height: 52px;
      padding: 10px 12px;
      color: var(--brown-light);
      background: #fffdf9;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-weight: 900;
    }

    .tab-button.active,
    .filter-button.active {
      color: #fff;
      background: var(--brown);
      border-color: var(--brown);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 0 18px;
      padding-bottom: 3px;
    }

    .filter-button {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 7px 13px;
      font-size: 14px;
    }

    .count-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .count-box {
      padding: 12px 8px;
      text-align: center;
      background: #fffdf9;
      border: 1px solid var(--line);
      border-radius: 13px;
    }

    .count-box strong {
      display: block;
      font-size: 28px;
      line-height: 1.15;
    }

    .count-box span {
      color: var(--gray);
      font-size: 12px;
    }

    .count-box.pending strong { color: var(--gold); }
    .count-box.public strong { color: var(--green); }
    .count-box.hidden strong { color: var(--red); }

    .list {
      display: grid;
      gap: 16px;
    }

    .item-card {
      padding: 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 17px;
      box-shadow: 0 6px 18px rgba(73, 42, 24, .07);
    }

    .item-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .item-id,
    .item-date {
      margin: 0;
      color: var(--gray);
      font-size: 13px;
    }

    .item-title {
      margin: 0 0 5px;
      font-size: 24px;
      line-height: 1.35;
    }

    .item-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .menu-name {
      margin: 0 0 8px;
      color: var(--brown-light);
      font-size: 15px;
    }

    .stars {
      margin: 0 0 8px;
      color: var(--gold);
      letter-spacing: .08em;
    }

    .status-badge {
      flex: 0 0 auto;
      padding: 4px 10px;
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
    }

    .status-badge.pending { background: var(--gold); }
    .status-badge.public { background: var(--green); }
    .status-badge.hidden { background: var(--red); }
    .status-badge.draft { background: var(--gray); }

    .photo-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin: 14px 0;
      padding: 2px 2px 8px;
      overscroll-behavior-inline: contain;
    }

    .photo-box {
      position: relative;
      flex: 0 0 126px;
      height: 126px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #f5eee5;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    a.photo-box { display: block; }

    .remove-photo {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 30px;
      height: 30px;
      padding: 0;
      color: #fff;
      background: rgba(75, 38, 25, .88);
      border: 0;
      border-radius: 50%;
      font-size: 22px;
      line-height: 30px;
    }

    .notes-input {
      min-height: 90px;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .action-button {
      min-height: 50px;
      padding: 8px 10px;
      color: #fff;
      border: 0;
      border-radius: 11px;
      font-weight: 900;
      font-size: 15px;
    }

    .action-button.publish { background: var(--green); }
    .action-button.pending {
      color: var(--brown-dark);
      background: #f0c36b;
    }

    .action-button.hide { background: var(--red); }

    .action-button.save {
      color: var(--brown-dark);
      background: #eadfd2;
    }

    .action-button:disabled {
      cursor: wait;
      opacity: .55;
    }

    .news-form {
      margin-bottom: 24px;
    }

    .news-form h3 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    .form-actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .form-actions .button {
      flex: 1 1 180px;
    }

    .news-card .item-title {
      margin-bottom: 7px;
    }

    .news-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .news-links a {
      color: var(--blue);
      font-size: 14px;
      word-break: break-all;
    }

    .empty-box {
      padding: 28px 16px;
      color: var(--gray);
      text-align: center;
      background: #fffdf9;
      border: 1px dashed #d8c6b5;
      border-radius: 14px;
    }

    footer {
      padding: 22px 16px 40px;
      color: var(--gray);
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 560px) {
      body { font-size: 16px; }
      main { padding-inline: 10px; }
      header { padding-inline: 10px; }
      .brand span { font-size: 15px; }
      .back-link {
        padding: 7px 9px;
        font-size: 12px;
      }
      .card {
        padding: 16px 13px;
        border-radius: 16px;
      }
      .item-card { padding: 14px; }
      .item-title { font-size: 21px; }
      .action-row { grid-template-columns: 1fr 1fr; }
      .photo-box {
        flex-basis: 112px;
        height: 112px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="header-inner">
        <a class="brand" href="index.html">
          <img src="icon.jpg" alt="">
          <span>おうちcafeパン工房<br>管理者画面</span>
        </a>
        <a class="back-link" href="index.html">公開ページ</a>
      </div>
    </header>

    <main>
      <section class="card login-card" id="loginCard">
        <h1 class="page-title">管理者ログイン</h1>
        <p class="lead">お客様の声とお知らせを管理します。</p>

        <div class="status-message" id="loginStatus"></div>

        <form id="loginForm">
          <div class="field">
            <label class="label" for="adminPassword">管理者パスワード</label>
            <input id="adminPassword" type="password" autocomplete="current-password" required>
          </div>
          <button class="primary-button" id="loginButton" type="submit">管理者画面を開く</button>
        </form>
      </section>

      <section class="admin-panel" id="adminPanel">
        <div class="card">
          <div class="toolbar">
            <h2>管理メニュー</h2>
            <div class="toolbar-buttons">
              <button class="button light" id="refreshButton" type="button">再読み込み</button>
              <button class="button red" id="logoutButton" type="button">ログアウト</button>
            </div>
          </div>

          <div class="status-message" id="adminStatus"></div>

          <div class="tabs">
            <button class="tab-button active" data-tab="posts" type="button">お客様の声</button>
            <button class="tab-button" data-tab="news" type="button">お知らせ</button>
          </div>

          <section class="panel active" id="postsPanel">
            <div class="count-grid">
              <div class="count-box pending">
                <strong id="pendingCount">0</strong>
                <span>確認待ち</span>
              </div>
              <div class="count-box public">
                <strong id="publicCount">0</strong>
                <span>公開</span>
              </div>
              <div class="count-box hidden">
                <strong id="hiddenCount">0</strong>
                <span>非公開</span>
              </div>
            </div>

            <div class="filter-row">
              <button class="filter-button active" data-filter="確認待ち" type="button">確認待ち</button>
              <button class="filter-button" data-filter="公開" type="button">公開</button>
              <button class="filter-button" data-filter="非公開" type="button">非公開</button>
              <button class="filter-button" data-filter="すべて" type="button">すべて</button>
            </div>

            <div class="list" id="postList"></div>
          </section>

          <section class="panel" id="newsPanel">
            <form class="news-form" id="newsForm">
              <h3>お知らせを登録・編集</h3>

              <input id="newsId" type="hidden">

              <div class="field">
                <label class="label" for="newsDate">
                  投稿日<span class="required">必須</span>
                </label>
                <input id="newsDate" type="date" required>
              </div>

              <div class="field">
                <label class="label" for="newsTitle">
                  タイトル<span class="required">必須</span>
                </label>
                <input id="newsTitle" type="text" maxlength="120" required>
              </div>

              <div class="field">
                <label class="label" for="newsBody">
                  本文<span class="required">必須</span>
                </label>
                <textarea id="newsBody" maxlength="5000" required></textarea>
              </div>

              <div class="field">
                <label class="label" for="newsPhotoInput">
                  画像<span class="optional">最大5枚</span>
                </label>
                <input id="newsPhotoInput" type="file" accept="image/*" multiple>
                <p class="help">既存画像は右上の×で削除できます。写真は横に並びます。</p>
                <p class="help" id="newsPhotoCount">0 / 5枚</p>
                <div class="photo-row" id="newsPhotoPreview"></div>
              </div>

              <div class="field">
                <label class="label" for="newsVideoUrl">
                  YouTube URL<span class="optional">任意</span>
                </label>
                <input
                  id="newsVideoUrl"
                  type="url"
                  placeholder="https://www.youtube.com/watch?v= または shorts URL"
                >
                <p class="help">登録した動画は公開ページ内で再生されます。</p>
              </div>

              <div class="field">
                <label class="label" for="newsExternalUrl">
                  外部リンク<span class="optional">任意</span>
                </label>
                <input
                  id="newsExternalUrl"
                  type="url"
                  placeholder="https://example.com/"
                >
              </div>

              <div class="field">
                <label class="label" for="newsStatus">掲載状態</label>
                <select id="newsStatus">
                  <option value="下書き">下書き</option>
                  <option value="公開">公開</option>
                  <option value="非公開">非公開</option>
                </select>
              </div>

              <div class="form-actions">
                <button class="button green" id="newsSaveButton" type="submit">
                  お知らせを保存
                </button>
                <button class="button light" id="newsCancelButton" type="button">
                  入力取消
                </button>
              </div>
            </form>

            <h3>お知らせ一覧</h3>
            <div class="list" id="newsList"></div>
          </section>
        </div>
      </section>
    </main>

    <footer>© おうちcafeパン工房｜管理者専用</footer>
  </div>

  <script>
    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzGf0NYPum3d0bPGoVyd6GVY3dWSbAf9w4mzdvdF0uB8OXTMxqAmYJ7BvOnHPFD1k-7pw/exec";

    const MAX_PHOTOS = 5;
    const MAX_FILE_SIZE = 20 * 1024 * 1024;
    const MAX_IMAGE_WIDTH = 1600;
    const JPEG_QUALITY = 0.78;
    const PASSWORD_KEY = "ouchicafeAdminPassword";

    let adminPassword = sessionStorage.getItem(PASSWORD_KEY) || "";
    let posts = [];
    let newsItems = [];
    let currentFilter = "確認待ち";
    let existingNewsImages = [];
    let newNewsFiles = [];

    const $ = (id) => document.getElementById(id);

    const loginCard = $("loginCard");
    const loginForm = $("loginForm");
    const passwordInput = $("adminPassword");
    const loginButton = $("loginButton");
    const loginStatus = $("loginStatus");
    const adminPanel = $("adminPanel");
    const adminStatus = $("adminStatus");
    const postList = $("postList");
    const newsList = $("newsList");
    const refreshButton = $("refreshButton");
    const logoutButton = $("logoutButton");
    const newsForm = $("newsForm");
    const newsPhotoInput = $("newsPhotoInput");
    const newsPhotoPreview = $("newsPhotoPreview");
    const newsPhotoCount = $("newsPhotoCount");
    const newsSaveButton = $("newsSaveButton");
    const newsCancelButton = $("newsCancelButton");

    if (adminPassword) {
      passwordInput.value = adminPassword;
    }

    setToday();
    renderNewsPhotoPreview();

    loginForm.addEventListener("submit", handleLogin);
    refreshButton.addEventListener("click", () => loadAllData(false));
    logoutButton.addEventListener("click", logout);
    newsForm.addEventListener("submit", handleNewsSave);
    newsCancelButton.addEventListener("click", resetNewsForm);
    newsPhotoInput.addEventListener("change", handleNewsPhotoSelection);
    postList.addEventListener("click", handlePostAction);
    newsList.addEventListener("click", handleNewsAction);
    newsPhotoPreview.addEventListener("click", handlePreviewRemove);

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab-button").forEach((item) => {
          item.classList.toggle("active", item === button);
        });

        $("postsPanel").classList.toggle(
          "active",
          button.dataset.tab === "posts"
        );

        $("newsPanel").classList.toggle(
          "active",
          button.dataset.tab === "news"
        );
      });
    });

    document.querySelectorAll(".filter-button").forEach((button) => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;

        document.querySelectorAll(".filter-button").forEach((item) => {
          item.classList.toggle("active", item === button);
        });

        renderPosts();
      });
    });

    async function handleLogin(event) {
      event.preventDefault();

      const password = passwordInput.value.trim();

      if (!password) {
        showMessage(
          loginStatus,
          "管理者パスワードを入力してください。",
          "error"
        );
        return;
      }

      adminPassword = password;
      await loadAllData(true);
    }

    async function loadAllData(isLogin) {
      setLoading(true);

      showMessage(
        isLogin ? loginStatus : adminStatus,
        "データを読み込んでいます…",
        "info"
      );

      try {
        const results = await Promise.all([
          apiRequest({
            mode: "adminList",
            adminPassword
          }),
          apiRequest({
            mode: "adminNewsList",
            adminPassword
          })
        ]);

        posts = Array.isArray(results[0].posts)
          ? results[0].posts.map(normalizePost)
          : [];

        newsItems = Array.isArray(results[1].news)
          ? results[1].news.map(normalizeNews)
          : [];

        sessionStorage.setItem(PASSWORD_KEY, adminPassword);

        loginCard.style.display = "none";
        adminPanel.classList.add("show");

        clearMessage(loginStatus);
        showMessage(
          adminStatus,
          "最新データを読み込みました。",
          "success"
        );

        updateCounts();
        renderPosts();
        renderNews();
      } catch (error) {
        showMessage(
          isLogin ? loginStatus : adminStatus,
          getErrorMessage(error),
          "error"
        );
      } finally {
        setLoading(false);
      }
    }

    async function apiRequest(data) {
      const response = await fetch(GAS_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(data),
        redirect: "follow"
      });

      if (!response.ok) {
        throw new Error("通信エラーが発生しました。");
      }

      const responseText = await response.text();

      let result;

      try {
        result = JSON.parse(responseText);
      } catch (error) {
        throw new Error(
          "サーバーから正しい返答を受け取れませんでした。"
        );
      }

      if (!result || result.success !== true) {
        throw new Error(
          result && result.message
            ? result.message
            : "処理に失敗しました。"
        );
      }

      return result;
    }

    function normalizePost(item) {
      return {
        id: String(item.id || item.postId || ""),
        date: String(item.date || item.postDate || ""),
        nickname: String(
          item.nickname || item.name || "名前なし"
        ),
        rating: Math.max(
          0,
          Math.min(5, Number(item.rating) || 0)
        ),
        menuName: String(
          item.menuName || item.productName || ""
        ),
        comment: String(item.comment || ""),
        images: normalizeImages(item.images || item.photos),
        status: normalizePostStatus(
          item.status || item.publicStatus
        ),
        approvedAt: String(item.approvedAt || ""),
        notes: String(item.notes || item.memo || "")
      };
    }

    function normalizeNews(item) {
      return {
        id: String(item.id || item.newsId || ""),
        date: String(item.date || item.postDate || ""),
        title: String(item.title || ""),
        body: String(item.body || ""),
        images: normalizeImages(item.images),
        videoUrl: safeUrl(
          item.videoUrl || item.youtubeUrl
        ),
        externalUrl: safeUrl(
          item.externalUrl || item.link
        ),
        status: normalizeNewsStatus(
          item.status || item.publicStatus
        ),
        createdAt: String(item.createdAt || ""),
        updatedAt: String(item.updatedAt || "")
      };
    }

    function normalizeImages(value) {
      if (Array.isArray(value)) {
        return value
          .map((item) => safeUrl(item))
          .filter(Boolean)
          .slice(0, MAX_PHOTOS);
      }

      if (typeof value === "string" && value.trim()) {
        return value
          .split(/\s*,\s*/)
          .map((item) => safeUrl(item))
          .filter(Boolean)
          .slice(0, MAX_PHOTOS);
      }

      return [];
    }

    function updateCounts() {
      $("pendingCount").textContent =
        posts.filter((post) => post.status === "確認待ち").length;

      $("publicCount").textContent =
        posts.filter((post) => post.status === "公開").length;

      $("hiddenCount").textContent =
        posts.filter((post) => post.status === "非公開").length;
    }

    function renderPosts() {
      const filtered =
        currentFilter === "すべて"
          ? posts
          : posts.filter(
              (post) => post.status === currentFilter
            );

      if (!filtered.length) {
        postList.innerHTML =
          '<div class="empty-box">該当する投稿はありません。</div>';
        return;
      }

      postList.innerHTML = filtered
        .map((post) => {
          const photos = post.images
            .map(
              (url, index) => `
          <a
            class="photo-box"
            href="${escapeAttribute(url)}"
            target="_blank"
            rel="noopener"
          >
            <img
              src="${escapeAttribute(url)}"
              alt="投稿写真 ${index + 1}"
              loading="lazy"
            >
          </a>
        `
            )
            .join("");

          return `
          <article
            class="item-card"
            data-post-id="${escapeAttribute(post.id)}"
          >
            <div class="item-head">
              <div>
                <p class="item-id">
                  投稿ID：${escapeHtml(post.id)}
                </p>
                <p class="item-date">
                  ${escapeHtml(post.date)}
                </p>
              </div>

              <span class="status-badge ${getStatusClass(post.status)}">
                ${escapeHtml(post.status)}
              </span>
            </div>

            <h3 class="item-title">
              ${escapeHtml(post.nickname)}
            </h3>

            <p
              class="stars"
              aria-label="星${post.rating}つ"
            >
              ${"★".repeat(post.rating)}${"☆".repeat(5 - post.rating)}
            </p>

            ${
              post.menuName
                ? `<p class="menu-name">商品名：${escapeHtml(
                    post.menuName
                  )}</p>`
                : ""
            }

            <p class="item-text">
              ${escapeHtml(post.comment)}
            </p>

            ${
              photos
                ? `<div class="photo-row">${photos}</div>`
                : ""
            }

            ${
              post.approvedAt
                ? `<p class="help">承認日時：${escapeHtml(
                    post.approvedAt
                  )}</p>`
                : ""
            }

            <label
              class="label"
              for="notes-${escapeAttribute(post.id)}"
            >
              管理者備考
            </label>

            <textarea
              class="notes-input"
              id="notes-${escapeAttribute(post.id)}"
              maxlength="500"
              placeholder="確認内容や非公開理由など"
            >${escapeHtml(post.notes)}</textarea>

            <div class="action-row">
              <button
                class="action-button publish"
                type="button"
                data-post-action="公開"
              >
                公開する
              </button>

              <button
                class="action-button pending"
                type="button"
                data-post-action="確認待ち"
              >
                確認待ち
              </button>

              <button
                class="action-button hide"
                type="button"
                data-post-action="非公開"
              >
                非公開
              </button>

              <button
                class="action-button save"
                type="button"
                data-post-action="備考保存"
              >
                備考保存
              </button>
            </div>
          </article>
        `;
        })
        .join("");
    }

    async function handlePostAction(event) {
      const button = event.target.closest(
        "[data-post-action]"
      );

      if (!button) return;

      const card = button.closest("[data-post-id]");
      const post = posts.find(
        (item) => item.id === card.dataset.postId
      );

      if (!post) return;

      const notes = card
        .querySelector(".notes-input")
        .value.trim();

      const action = button.dataset.postAction;

      const status =
        action === "備考保存"
          ? post.status
          : action;

      setCardDisabled(card, true);

      showMessage(
        adminStatus,
        "投稿情報を更新しています…",
        "info"
      );

      try {
        const result = await apiRequest({
          mode: "adminUpdate",
          adminPassword,
          postId: post.id,
          status,
          notes
        });

        post.status = normalizePostStatus(
          result.status || status
        );

        post.notes = String(
          result.notes || notes
        );

        post.approvedAt = String(
          result.approvedAt ||
            post.approvedAt ||
            ""
        );

        updateCounts();
        renderPosts();

        showMessage(
          adminStatus,
          "投稿情報を更新しました。",
          "success"
        );
      } catch (error) {
        setCardDisabled(card, false);

        showMessage(
          adminStatus,
          getErrorMessage(error),
          "error"
        );
      }
    }

    function renderNews() {
      if (!newsItems.length) {
        newsList.innerHTML =
          '<div class="empty-box">お知らせはまだありません。</div>';
        return;
      }

      newsList.innerHTML = newsItems
        .map((item) => {
          const photos = item.images
            .map(
              (url, index) => `
          <a
            class="photo-box"
            href="${escapeAttribute(url)}"
            target="_blank"
            rel="noopener"
          >
            <img
              src="${escapeAttribute(url)}"
              alt="お知らせ画像 ${index + 1}"
              loading="lazy"
            >
          </a>
        `
            )
            .join("");

          return `
          <article
            class="item-card news-card"
            data-news-id="${escapeAttribute(item.id)}"
          >
            <div class="item-head">
              <div>
                <p class="item-id">
                  お知らせID：${escapeHtml(item.id)}
                </p>

                <p class="item-date">
                  投稿日：${escapeHtml(item.date)}
                </p>
              </div>

              <span class="status-badge ${getStatusClass(item.status)}">
                ${escapeHtml(item.status)}
              </span>
            </div>

            <h3 class="item-title">
              ${escapeHtml(item.title)}
            </h3>

            <p class="item-text">
              ${escapeHtml(item.body)}
            </p>

            ${
              photos
                ? `<div class="photo-row">${photos}</div>`
                : ""
            }

            <div class="news-links">
              ${
                item.videoUrl
                  ? `<a
                      href="${escapeAttribute(item.videoUrl)}"
                      target="_blank"
                      rel="noopener"
                    >
                      YouTubeを確認
                    </a>`
                  : ""
              }

              ${
                item.externalUrl
                  ? `<a
                      href="${escapeAttribute(item.externalUrl)}"
                      target="_blank"
                      rel="noopener"
                    >
                      外部リンクを確認
                    </a>`
                  : ""
              }
            </div>

            <div class="action-row">
              <button
                class="action-button publish"
                type="button"
                data-news-action="公開"
              >
                公開
              </button>

              <button
                class="action-button pending"
                type="button"
                data-news-action="下書き"
              >
                下書き
              </button>

              <button
                class="action-button hide"
                type="button"
                data-news-action="非公開"
              >
                非公開
              </button>

              <button
                class="action-button save"
                type="button"
                data-news-action="編集"
              >
                編集
              </button>

              <button
                class="action-button hide"
                type="button"
                data-news-action="削除"
              >
                削除
              </button>
            </div>
          </article>
        `;
        })
        .join("");
    }

    async function handleNewsAction(event) {
      const button = event.target.closest(
        "[data-news-action]"
      );

      if (!button) return;

      const card = button.closest("[data-news-id]");
      const item = newsItems.find(
        (news) => news.id === card.dataset.newsId
      );

      if (!item) return;

      const action = button.dataset.newsAction;

      if (action === "編集") {
        editNews(item);
        return;
      }

      if (action === "削除") {
        await deleteNewsItem(item, card);
        return;
      }

      await saveNewsStatus(item, action, card);
    }

    async function saveNewsStatus(item, status, card) {
      setCardDisabled(card, true);

      showMessage(
        adminStatus,
        "お知らせを更新しています…",
        "info"
      );

      try {
        await apiRequest({
          mode: "adminNewsSave",
          adminPassword,
          newsId: item.id,
          date: item.date,
          title: item.title,
          body: item.body,
          existingImages: item.images,
          newImages: [],
          videoUrl: item.videoUrl,
          externalUrl: item.externalUrl,
          status
        });

        await loadNewsOnly();

        showMessage(
          adminStatus,
          "お知らせを更新しました。",
          "success"
        );
      } catch (error) {
        setCardDisabled(card, false);

        showMessage(
          adminStatus,
          getErrorMessage(error),
          "error"
        );
      }
    }

    async function deleteNewsItem(item, card) {
      if (
        !window.confirm(
          "この記事を完全に削除します。\n" +
          "削除した記事は元に戻せません。\n" +
          "本当に削除しますか？"
        )
      ) {
        return;
      }

      setCardDisabled(card, true);

      showMessage(
        adminStatus,
        "お知らせを削除しています…",
        "info"
      );

      try {
        await apiRequest({
          mode: "adminNewsDelete",
          adminPassword,
          newsId: item.id
        });

        if ($("newsId").value === item.id) {
          resetNewsForm();
        }

        await loadNewsOnly();

        showMessage(
          adminStatus,
          "お知らせを削除しました。",
          "success"
        );
      } catch (error) {
        setCardDisabled(card, false);

        showMessage(
          adminStatus,
          getErrorMessage(error),
          "error"
        );
      }
    }

    function editNews(item) {
      $("newsId").value = item.id;
      $("newsDate").value = toDateInputValue(item.date);
      $("newsTitle").value = item.title;
      $("newsBody").value = item.body;
      $("newsVideoUrl").value = item.videoUrl;
      $("newsExternalUrl").value = item.externalUrl;
      $("newsStatus").value = item.status;

      existingNewsImages = item.images.slice(
        0,
        MAX_PHOTOS
      );

      newNewsFiles = [];

      renderNewsPhotoPreview();

      newsSaveButton.textContent =
        "お知らせを更新";

      newsForm.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    async function handleNewsSave(event) {
      event.preventDefault();

      const date = $("newsDate").value;
      const title = $("newsTitle").value.trim();
      const body = $("newsBody").value.trim();

      if (!date || !title || !body) {
        showMessage(
          adminStatus,
          "投稿日・タイトル・本文を入力してください。",
          "error"
        );
        return;
      }

      if (
        existingNewsImages.length +
          newNewsFiles.length >
        MAX_PHOTOS
      ) {
        showMessage(
          adminStatus,
          "画像は最大5枚までです。",
          "error"
        );
        return;
      }

      newsSaveButton.disabled = true;

      showMessage(
        adminStatus,
        "お知らせを保存しています…",
        "info"
      );

      try {
        const convertedImages = [];

        for (
          let index = 0;
          index < newNewsFiles.length;
          index++
        ) {
          newsSaveButton.textContent =
            `画像準備 ${index + 1} / ${newNewsFiles.length}`;

          convertedImages.push(
            await convertImageForUpload(
              newNewsFiles[index]
            )
          );
        }

        newsSaveButton.textContent =
          "保存しています…";

        await apiRequest({
          mode: "adminNewsSave",
          adminPassword,
          newsId: $("newsId").value,
          date,
          title,
          body,
          existingImages: existingNewsImages,
          newImages: convertedImages,
          videoUrl: safeUrl(
            $("newsVideoUrl").value
          ),
          externalUrl: safeUrl(
            $("newsExternalUrl").value
          ),
          status: $("newsStatus").value
        });

        resetNewsForm();
        await loadNewsOnly();

        showMessage(
          adminStatus,
          "お知らせを保存しました。",
          "success"
        );
      } catch (error) {
        showMessage(
          adminStatus,
          getErrorMessage(error),
          "error"
        );
      } finally {
        newsSaveButton.disabled = false;
        newsSaveButton.textContent =
          "お知らせを保存";
      }
    }

    async function loadNewsOnly() {
      const result = await apiRequest({
        mode: "adminNewsList",
        adminPassword
      });

      newsItems = Array.isArray(result.news)
        ? result.news.map(normalizeNews)
        : [];

      renderNews();
    }

    function handleNewsPhotoSelection(event) {
      const files = Array.from(
        event.target.files || []
      );

      for (const file of files) {
        if (
          existingNewsImages.length +
            newNewsFiles.length >=
          MAX_PHOTOS
        ) {
          break;
        }

        if (
          !file.type.startsWith("image/") ||
          file.size > MAX_FILE_SIZE
        ) {
          continue;
        }

        const duplicate = newNewsFiles.some(
          (selected) =>
            selected.name === file.name &&
            selected.size === file.size &&
            selected.lastModified === file.lastModified
        );

        if (!duplicate) {
          newNewsFiles.push(file);
        }
      }

      newsPhotoInput.value = "";
      renderNewsPhotoPreview();
    }

    function renderNewsPhotoPreview() {
      newsPhotoPreview.innerHTML = "";

      existingNewsImages.forEach((url, index) => {
        newsPhotoPreview.appendChild(
          createPreviewBox(url, "existing", index)
        );
      });

      newNewsFiles.forEach((file, index) => {
        const objectUrl = URL.createObjectURL(file);
        const box = createPreviewBox(
          objectUrl,
          "new",
          index
        );

        const image = box.querySelector("img");

        image.addEventListener(
          "load",
          () => URL.revokeObjectURL(objectUrl),
          { once: true }
        );

        newsPhotoPreview.appendChild(box);
      });

      newsPhotoCount.textContent =
        `${existingNewsImages.length + newNewsFiles.length} / 5枚`;
    }

    function createPreviewBox(url, kind, index) {
      const box = document.createElement("div");
      box.className = "photo-box";

      const image = document.createElement("img");
      image.src = url;
      image.alt = "選択した画像";

      const button = document.createElement("button");
      button.className = "remove-photo";
      button.type = "button";
      button.textContent = "×";
      button.dataset.removeKind = kind;
      button.dataset.removeIndex = String(index);

      box.append(image, button);

      return box;
    }

    function handlePreviewRemove(event) {
      const button = event.target.closest(
        "[data-remove-kind]"
      );

      if (!button) return;

      const index = Number(
        button.dataset.removeIndex
      );

      if (
        button.dataset.removeKind ===
        "existing"
      ) {
        existingNewsImages.splice(index, 1);
      } else {
        newNewsFiles.splice(index, 1);
      }

      renderNewsPhotoPreview();
    }

    function resetNewsForm() {
      newsForm.reset();

      $("newsId").value = "";

      existingNewsImages = [];
      newNewsFiles = [];

      setToday();

      $("newsStatus").value = "下書き";

      newsSaveButton.textContent =
        "お知らせを保存";

      renderNewsPhotoPreview();
    }

    function convertImageForUpload(file) {
      return new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(file);
        const image = new Image();

        image.onload = () => {
          let width =
            image.naturalWidth || image.width;

          let height =
            image.naturalHeight || image.height;

          if (width > MAX_IMAGE_WIDTH) {
            const ratio =
              MAX_IMAGE_WIDTH / width;

            width = MAX_IMAGE_WIDTH;
            height = Math.round(height * ratio);
          }

          const canvas =
            document.createElement("canvas");

          canvas.width = width;
          canvas.height = height;

          canvas
            .getContext("2d")
            .drawImage(
              image,
              0,
              0,
              width,
              height
            );

          URL.revokeObjectURL(objectUrl);

          resolve({
            name: replaceExtension(
              file.name,
              "jpg"
            ),
            mimeType: "image/jpeg",
            data: canvas.toDataURL(
              "image/jpeg",
              JPEG_QUALITY
            )
          });
        };

        image.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          reject(
            new Error(
              "画像を読み込めませんでした。"
            )
          );
        };

        image.src = objectUrl;
      });
    }

    function replaceExtension(filename, extension) {
      const cleanName = String(
        filename || "photo"
      )
        .replace(/\.[^.]+$/, "")
        .replace(
          /[^a-zA-Z0-9ぁ-んァ-ヶ一-龠_-]/g,
          "-"
        )
        .slice(0, 60);

      return `${cleanName || "photo"}.${extension}`;
    }

    function normalizePostStatus(value) {
      const status = String(value || "");

      if (status === "公開") return "公開";
      if (status === "非公開") return "非公開";

      return "確認待ち";
    }

    function normalizeNewsStatus(value) {
      const status = String(value || "");

      if (status === "公開") return "公開";
      if (status === "非公開") return "非公開";

      return "下書き";
    }

    function getStatusClass(status) {
      if (status === "公開") return "public";
      if (status === "非公開") return "hidden";
      if (status === "下書き") return "draft";

      return "pending";
    }

    function setCardDisabled(card, disabled) {
      card
        .querySelectorAll("button, textarea")
        .forEach((element) => {
          element.disabled = disabled;
        });
    }

    function setLoading(isLoading) {
      loginButton.disabled = isLoading;
      refreshButton.disabled = isLoading;

      loginButton.textContent = isLoading
        ? "読み込み中…"
        : "管理者画面を開く";
    }

    function setToday() {
      const now = new Date();

      $("newsDate").value = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join("-");
    }

    function toDateInputValue(value) {
      const text = String(value || "").trim();

      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return text;
      }

      const date = new Date(text);

      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, "0"),
        String(date.getDate()).padStart(2, "0")
      ].join("-");
    }

    function logout() {
      sessionStorage.removeItem(PASSWORD_KEY);

      adminPassword = "";
      posts = [];
      newsItems = [];

      passwordInput.value = "";

      adminPanel.classList.remove("show");
      loginCard.style.display = "block";

      clearMessage(adminStatus);
      clearMessage(loginStatus);

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function showMessage(element, message, type) {
      element.textContent = message;
      element.className =
        `status-message show ${type}`;
    }

    function clearMessage(element) {
      element.textContent = "";
      element.className = "status-message";
    }

    function getErrorMessage(error) {
      return error && error.message
        ? error.message
        : "処理中にエラーが発生しました。";
    }

    function safeUrl(value) {
      const url = String(value || "").trim();

      return /^https?:\/\//i.test(url)
        ? url
        : "";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(
        /[&<>'"]/g,
        (char) =>
          ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "'": "&#39;",
            '"': "&quot;"
          }[char])
      );
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
