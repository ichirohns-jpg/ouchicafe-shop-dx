  <style>
    :root {
      --brown: #4b2619;
      --brown-light: #76513d;
      --cream: #fffaf1;
      --paper: #fffdf8;
      --line: #eadfd2;
      --green: #667253;
      --shadow: 0 12px 32px rgba(73, 42, 24, .10);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--brown);
      background: var(--cream);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.8;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; }

    .wrap {

      margin: 0 auto;

    header {

      background: rgba(255, 253, 248, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .header-inner {

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;

      gap: 10px;

      font-weight: 800;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .brand img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 50%;
    }

    .brand span {
      font-size: clamp(15px, 2vw, 21px);
    }

    nav {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav a {

      text-decoration: none;
      color: var(--brown-light);

    nav a:hover {

      border: 0;

        rgba(45, 24, 14, .18) 70%,

      inset: 0;

      height: 100%;

      gap: 18px;
    }

      display: grid;

      margin: 0 0 5px;

      line-height: 1.45;
    }

    .news-date {
      margin: 0 0 8px;
      color: var(--brown-light);
      font-size: 13px;
    }

    .news-body {
      margin: 0;
      white-space: pre-wrap;
    }

    .news-link {
      display: inline-block;
      margin-top: 10px;
      font-weight: 700;

      border: 0;
      border-radius: 10px;
      margin-top: 15px;
    }

      color: var(--brown-light);
      background: #fff;
    }

      box-shadow: var(--shadow);
    }

    .menu-card img {

      aspect-ratio: 4 / 3;
      object-fit: cover;

    .menu-card h3 {
      margin: 0 0 6px;
      font-size: 19px;
    }

    .menu-card p {
      margin: 0;
      color: var(--brown-light);

      background: #fff;
